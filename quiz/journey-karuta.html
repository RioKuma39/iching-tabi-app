<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#efe3ce">
<title>イーチン旅カルタ｜イーチン旅タロット</title>
<style>
:root{--ink:#34271e;--muted:#74675d;--paper:#fffaf1;--gold:#a9762c;--line:#d2bea0;--ok:#337558;--brown:#76522a}
*{box-sizing:border-box}html{min-height:100%;background:#e4d3b8}body{margin:0;min-height:100%;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:radial-gradient(circle at 50% -10%,#fffaf3 0,#f0e4d1 50%,#e2cfb2 100%)}button,a{font:inherit}button{touch-action:manipulation}.home{position:fixed;z-index:20;top:max(10px,env(safe-area-inset-top));left:10px;padding:9px 13px;border:1px solid #c8b699;border-radius:999px;background:#fffaf1ed;color:var(--ink);text-decoration:none;font-size:13px;font-weight:800;box-shadow:0 5px 18px #5036191a}.app{width:min(100%,650px);margin:auto;padding:max(58px,calc(env(safe-area-inset-top) + 50px)) 12px max(28px,env(safe-area-inset-bottom))}.top{text-align:center}.eyebrow{margin:0 0 3px;color:var(--gold);font-size:11px;font-weight:900;letter-spacing:.15em}h1{margin:0;font:800 clamp(24px,7vw,34px)/1.25 YuMincho,"Yu Mincho",serif}.lead{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.65}
.status{display:flex;justify-content:space-between;align-items:center;margin:13px 3px 8px;padding:8px 12px;border:1px solid #d5c2a5;border-radius:14px;background:#fffaf1b8;color:var(--muted);font-size:12px;font-weight:800}.status strong{color:var(--ink);font-size:16px}.panel{overflow:hidden;border:1px solid var(--line);border-radius:24px;background:#fffaf2e8;box-shadow:0 14px 38px #52371b20}.reader{position:relative;padding:15px 52px 14px 16px;text-align:center;background:linear-gradient(135deg,#fffaf0,#f2e2c9);border-bottom:1px solid #dbc8aa}.reader-label{margin:0 0 4px;color:#8b6631;font-size:11px;font-weight:900;letter-spacing:.12em}.reader-text{margin:0;font:800 clamp(18px,5.5vw,26px)/1.45 YuMincho,"Yu Mincho",serif}.speak{position:absolute;right:10px;top:50%;translate:0 -50%;width:38px;height:38px;border:1px solid #c5ad89;border-radius:50%;background:#fffaf1;color:#674a29;font-size:18px;cursor:pointer}.message{min-height:37px;display:grid;place-items:center;margin:0;padding:6px 12px;background:#f5ecdf;color:#755d3e;text-align:center;font-size:12px;font-weight:800}.message.good{background:#e6f2ea;color:#285f49}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}.card{position:relative;min-width:0;aspect-ratio:2/3;padding:5px;border:2px solid transparent;border-radius:14px;background:#eadcc8;box-shadow:0 6px 14px #50361d24;cursor:pointer;overflow:hidden;transition:transform .18s,border-color .18s,opacity .25s}.card img{display:block;width:100%;height:100%;object-fit:contain;border-radius:8px;filter:drop-shadow(0 4px 5px #50371e2c)}.card:active{transform:scale(.97)}.card:focus-visible{outline:3px solid var(--brown);outline-offset:3px}.card.miss{animation:shake .28s;border-color:#b7834c}.card.hint{border-color:#bd862e;box-shadow:0 0 0 4px #f5dca9,0 6px 14px #50361d24}.card.taken{border-color:var(--ok);background:#e2f0e7;cursor:default}.taken-label{display:none;position:absolute;inset:auto 5px 5px;padding:5px;border-radius:8px;background:#2f7356e8;color:#fff;text-align:center;font-size:10px;font-weight:900}.taken .taken-label{display:block}.card.taken img{opacity:.78}.card.taken::after{content:"✓";position:absolute;top:7px;right:7px;display:grid;place-items:center;width:25px;height:25px;border-radius:50%;background:var(--ok);color:#fff;font-weight:900}.next-wrap{display:none;padding:0 12px 13px}.next-wrap.show{display:block}.next{width:100%;padding:13px;border:0;border-radius:13px;background:var(--brown);color:#fff;font-weight:900;cursor:pointer}
.finish{display:none;padding:30px 20px 24px;text-align:center}.finish.show{display:block}.stamp{font-size:50px}.finish h2{margin:4px 0;font:800 25px YuMincho,"Yu Mincho",serif}.finish p{color:var(--muted);font-size:13px;line-height:1.7}.collection{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0}.collection div{padding:7px;border-radius:10px;background:#f1e6d5;font-size:11px;line-height:1.45}.collection strong{display:block;font-size:12px}.actions{display:grid;gap:9px}.actions button,.actions a{padding:13px;border-radius:14px;text-decoration:none;font-weight:900}.again{border:0;background:var(--brown);color:#fff}.back-link{border:1px solid #cbb99d;background:#fffaf2;color:var(--ink)}.note{margin:12px 5px 0;color:#786b60;text-align:center;font-size:11px;line-height:1.6}@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@media(max-width:440px){.board{gap:6px;padding:8px}.card{padding:4px;border-radius:11px}.reader{padding-left:11px}.reader-text{font-size:18px}.taken-label{font-size:9px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}.card.miss{animation:none}}
</style>
</head>
<body>
<a class="home" href="index.html">← クイズ一覧</a>
<main class="app">
  <header class="top"><p class="eyebrow">JOURNEY KARUTA</p><h1>イーチン旅カルタ</h1><p class="lead">読み札にぴったりの絵を見つけよう。<br>6枚取り、約1〜2分で遊べます。</p></header>
  <div class="status" id="status"><span>あと <strong id="remaining">6</strong> 枚</span><span>連続発見 <strong id="combo">0</strong></span></div>
  <section class="panel" aria-live="polite">
    <div id="game">
      <div class="reader"><p class="reader-label" id="readerLabel">テーマの札</p><p class="reader-text" id="readerText"></p><button class="speak" id="speak" type="button" aria-label="読み札を音声で聞く">🔊</button></div>
      <p class="message" id="message">この言葉に合う絵をタップしてね</p>
      <div class="board" id="board"></div>
      <div class="next-wrap" id="nextWrap"><button class="next" id="next" type="button">次の読み札</button></div>
    </div>
    <div class="finish" id="finish"><div class="stamp">🏮</div><h2>6枚ぜんぶ取れた！</h2><p id="finishCopy"></p><div class="collection" id="collection"></div><div class="actions"><button class="again" id="again" type="button">別の6枚であそぶ</button><a class="back-link" href="index.html">クイズ一覧へ戻る</a></div></section>
  </section>
  <p class="note">速さより、言葉と絵のつながりを見つけることが大切です。読み上げは端末の音声機能を使います。</p>
</main>
<script src="../tarot/cards.js"></script>
<script>
(() => {
  const COUNT=6,readerLabel=document.getElementById('readerLabel'),readerText=document.getElementById('readerText'),message=document.getElementById('message'),board=document.getElementById('board'),remainingEl=document.getElementById('remaining'),comboEl=document.getElementById('combo'),nextWrap=document.getElementById('nextWrap');
  let roundCards=[],queue=[],current=null,taken=new Set(),locked=false,misses=0,combo=0,bestCombo=0,promptText='';
  function shuffle(list){const a=[...list];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
  function imagePath(card,plain=true){return `../tarot/cards/${card.no}${plain?'_plain':''}.webp`}
  function promptFor(card,step){const modes=[{label:'テーマの札',text:card.theme},{label:'旅人へのひとこと',text:card.oneLine},{label:'行動の札',text:card.advice}];return modes[step%modes.length]}
  function renderBoard(){
    board.innerHTML='';roundCards.forEach((card,i)=>{const b=document.createElement('button');b.type='button';b.className='card';if(taken.has(card.no))b.classList.add('taken');b.disabled=taken.has(card.no);b.setAttribute('aria-label',taken.has(card.no)?`${card.name}、獲得済み`:`${i+1}枚目の文字のないカード`);const img=document.createElement('img');img.src=imagePath(card,!taken.has(card.no));img.alt=taken.has(card.no)?`${card.name}の文字入りカード`:`選択肢${i+1}の文字のないカード`;const label=document.createElement('span');label.className='taken-label';label.textContent=taken.has(card.no)?`${Number(card.no)} ${card.name}`:'獲得';b.append(img,label);b.addEventListener('click',()=>choose(card,b));board.appendChild(b)})
  }
  function showPrompt(){
    current=queue[taken.size];misses=0;locked=false;const prompt=promptFor(current,taken.size);readerLabel.textContent=prompt.label;readerText.textContent=prompt.text;promptText=prompt.text;message.className='message';message.textContent='この言葉に合う絵をタップしてね';nextWrap.classList.remove('show');[...board.children].forEach(b=>b.classList.remove('hint'))
  }
  function choose(card,button){
    if(locked||taken.has(card.no))return;if(card.no!==current.no){misses++;combo=0;comboEl.textContent=combo;button.classList.remove('miss');void button.offsetWidth;button.classList.add('miss');message.className='message';message.textContent=misses>=2?'金色に光る絵を見てみよう':'もう一度、絵の手がかりを探してみよう';if(misses>=2){const correctIndex=roundCards.findIndex(c=>c.no===current.no);board.children[correctIndex].classList.add('hint')}return}
    locked=true;taken.add(card.no);combo++;bestCombo=Math.max(bestCombo,combo);remainingEl.textContent=COUNT-taken.size;comboEl.textContent=combo;renderBoard();message.className='message good';message.textContent=`✨ ${current.name}「${current.theme}」を発見！`;if(taken.size===COUNT){setTimeout(complete,650)}else{nextWrap.classList.add('show')}
  }
  function speak(){if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(promptText);u.lang='ja-JP';u.rate=.9;window.speechSynthesis.speak(u)}
  function complete(){
    document.getElementById('game').hidden=true;document.getElementById('status').hidden=true;document.getElementById('finish').classList.add('show');document.getElementById('finishCopy').textContent=`最高${bestCombo}枚連続で見つけました。6枚の言葉と絵を振り返ろう。`;const collection=document.getElementById('collection');collection.innerHTML='';queue.forEach(card=>{const d=document.createElement('div');d.innerHTML=`<strong>${Number(card.no)} ${card.name}</strong>${card.theme}`;collection.appendChild(d)});const plays=Number(localStorage.getItem('journeyKarutaPlays')||0)+1;localStorage.setItem('journeyKarutaPlays',String(plays));const oldBest=Number(localStorage.getItem('journeyKarutaBestCombo')||0);if(bestCombo>oldBest)localStorage.setItem('journeyKarutaBestCombo',String(bestCombo))
  }
  function start(){roundCards=shuffle(cards).slice(0,COUNT);queue=shuffle(roundCards);taken=new Set();locked=false;misses=0;combo=0;bestCombo=0;remainingEl.textContent=COUNT;comboEl.textContent='0';document.getElementById('game').hidden=false;document.getElementById('status').hidden=false;document.getElementById('finish').classList.remove('show');renderBoard();showPrompt()}
  document.getElementById('speak').addEventListener('click',speak);document.getElementById('next').addEventListener('click',showPrompt);document.getElementById('again').addEventListener('click',start);start();
})();
</script>
</body>
</html>
