<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#efe4d0">
<title>旅の順番クイズ｜イーチン旅タロット</title>
<style>
:root{--ink:#34271e;--muted:#74675d;--paper:#fffaf1;--gold:#a9762c;--line:#d2bea0;--ok:#34765a;--brown:#76522a}
*{box-sizing:border-box}html{min-height:100%;background:#e5d5bc}body{margin:0;min-height:100%;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:radial-gradient(circle at 50% -10%,#fffaf3 0,#f0e5d2 50%,#e3d1b6 100%)}button,a{font:inherit}button{touch-action:manipulation}.home{position:fixed;z-index:20;top:max(10px,env(safe-area-inset-top));left:10px;padding:9px 13px;border:1px solid #c8b699;border-radius:999px;background:#fffaf1ed;color:var(--ink);text-decoration:none;font-size:13px;font-weight:800;box-shadow:0 5px 18px #5036191a}.app{width:min(100%,660px);margin:auto;padding:max(58px,calc(env(safe-area-inset-top) + 50px)) 12px max(28px,env(safe-area-inset-bottom))}.top{text-align:center}.eyebrow{margin:0 0 3px;color:var(--gold);font-size:11px;font-weight:900;letter-spacing:.15em}h1{margin:0;font:800 clamp(24px,7vw,34px)/1.25 YuMincho,"Yu Mincho",serif}.lead{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.65}
.status{display:flex;align-items:center;gap:10px;margin:13px 3px 9px}.progress{display:flex;gap:5px;flex:1}.dot{height:7px;flex:1;border-radius:9px;background:#d7c8b2}.dot.now{background:var(--brown);box-shadow:0 0 0 3px #fff8}.dot.done{background:var(--gold)}.score{min-width:70px;text-align:right;color:var(--muted);font-size:12px;font-weight:800}.panel{overflow:hidden;border:1px solid var(--line);border-radius:24px;background:#fffaf2e8;box-shadow:0 14px 38px #52371b20}.prompt{padding:15px 16px 12px;text-align:center;background:linear-gradient(135deg,#fffaf0,#f4e6cf)}.prompt p{margin:0}.prompt-main{font-size:17px;font-weight:900}.prompt-sub{margin-top:5px!important;color:var(--muted);font-size:12px;line-height:1.55}
.path-labels{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:13px 10px 5px;color:#86683f;text-align:center;font-size:11px;font-weight:900}.path-labels span::after{content:" →"}.path-labels span:last-child::after{content:""}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:5px 10px 12px}.slot{position:relative;min-width:0;padding:5px 5px 38px;border:2px solid transparent;border-radius:14px;background:#eadcc8;box-shadow:0 6px 14px #50361d24;transition:transform .16s,border-color .2s}.slot.selected{border-color:#a16e2d;transform:translateY(-4px)}.slot.correct{border-color:var(--ok);background:#e3f0e8}.slot.wrong{border-color:#b27f44;background:#fff0d7}.slot img{display:block;width:100%;aspect-ratio:2/3;object-fit:contain;border-radius:8px;filter:drop-shadow(0 4px 5px #50371e2c)}.move{position:absolute;left:4px;right:4px;bottom:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px}.move button{min-height:30px;border:1px solid #c3aa86;border-radius:8px;background:#fffaf1;color:#674a29;font-weight:900;cursor:pointer}.move button:disabled{opacity:.28}.slot-pick{position:absolute;inset:5px 5px 38px;border:0;border-radius:8px;background:transparent;cursor:pointer}.slot-pick:focus-visible{outline:3px solid #76522a;outline-offset:2px}.story{display:none;margin:0 10px 12px;padding:11px;border-radius:13px;background:#f2e8d8}.story.show{display:grid;gap:7px}.story-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:start;font-size:12px;line-height:1.55}.story-no{display:grid;place-items:center;width:25px;height:25px;border-radius:50%;background:#76522a;color:#fff;font-size:11px;font-weight:900}.story-row strong{display:block}.story-row p{margin:1px 0;color:var(--muted)}
.controls{display:grid;grid-template-columns:1fr 1.5fr;gap:8px;padding:0 10px 14px}.controls button{min-height:47px;border-radius:13px;font-weight:900;cursor:pointer}.hint{border:1px solid #c6b08e;background:#fffaf2;color:#674a2a}.check{border:0;background:var(--brown);color:#fff}.feedback{display:none;padding:0 13px 15px;text-align:center}.feedback.show{display:block}.feedback-title{margin:0;font-size:18px;font-weight:900}.feedback-copy{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.65}.next{width:100%;margin-top:10px;padding:13px;border:0;border-radius:13px;background:var(--brown);color:#fff;font-weight:900}.finish{display:none;padding:30px 20px 24px;text-align:center}.finish.show{display:block}.stamp{font-size:50px}.finish h2{margin:4px 0;font:800 25px YuMincho,"Yu Mincho",serif}.finish p{color:var(--muted);font-size:13px;line-height:1.7}.actions{display:grid;gap:9px;margin-top:18px}.actions button,.actions a{padding:13px;border-radius:14px;text-decoration:none;font-weight:900}.again{border:0;background:var(--brown);color:#fff}.back-link{border:1px solid #cbb99d;background:#fffaf2;color:var(--ink)}.note{margin:12px 5px 0;color:#786b60;text-align:center;font-size:11px;line-height:1.6}
@media(max-width:440px){.cards{gap:5px;padding-left:7px;padding-right:7px}.path-labels{gap:5px;padding-left:7px;padding-right:7px}.slot{padding:4px 4px 36px;border-radius:11px}.slot-pick{inset:4px 4px 36px}.move button{font-size:12px}.prompt-main{font-size:15px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<a class="home" href="index.html">← クイズ一覧</a>
<main class="app">
  <header class="top"><p class="eyebrow">JOURNEY ORDER</p><h1>旅の順番クイズ</h1><p class="lead">3枚の絵を、旅の物語の順番に並べよう。<br>1回3問、約2分で遊べます。</p></header>
  <div class="status" id="status"><div class="progress" aria-label="3問中の進み具合"><span class="dot now"></span><span class="dot"></span><span class="dot"></span></div><div class="score" id="score">0 / 0 発見</div></div>
  <section class="panel" aria-live="polite">
    <div id="game">
      <div class="prompt"><p class="prompt-main">旅の早い順に並べてね</p><p class="prompt-sub">絵を2枚タップして入れ替えるか、下の矢印で動かせます。</p></div>
      <div class="path-labels"><span>はじめ</span><span>つづき</span><span>その先</span></div>
      <div class="cards" id="cardsArea"></div>
      <div class="story" id="story"></div>
      <div class="controls" id="controls"><button class="hint" id="hintButton" type="button">1枚ヒント</button><button class="check" id="checkButton" type="button">この順番にする</button></div>
      <div class="feedback" id="feedback"><p class="feedback-title" id="feedbackTitle"></p><p class="feedback-copy" id="feedbackCopy"></p><button class="next" id="nextButton" type="button">次の旅へ</button></div>
    </div>
    <div class="finish" id="finish"><div class="stamp">👣</div><h2 id="finishTitle"></h2><p id="finishCopy"></p><div class="actions"><button class="again" id="again" type="button">別の旅であそぶ</button><a class="back-link" href="index.html">クイズ一覧へ戻る</a></div></div>
  </section>
  <p class="note">番号を暗記するためではなく、64枚が一本の旅としてつながっていることを楽しむクイズです。</p>
</main>
<script src="../tarot/cards.js"></script>
<script>
(() => {
  const QUESTIONS=3,cardsArea=document.getElementById('cardsArea'),story=document.getElementById('story'),controls=document.getElementById('controls'),feedback=document.getElementById('feedback'),feedbackTitle=document.getElementById('feedbackTitle'),feedbackCopy=document.getElementById('feedbackCopy'),scoreEl=document.getElementById('score');
  let rounds=[],order=[],answer=[],index=0,score=0,selectedIndex=null,locked=false,hintUsed=false;
  function shuffle(list){const a=[...list];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
  function imagePath(card,plain=true){return `../tarot/cards/${card.no}${plain?'_plain':''}.webp`}
  function updateProgress(answered=false){document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot';if(i<index||(answered&&i===index))d.classList.add('done');else if(i===index)d.classList.add('now')});scoreEl.textContent=`${score} / ${index+(answered?1:0)} 発見`}
  function createRounds(){const starts=shuffle(Array.from({length:62},(_,i)=>i));return starts.slice(0,QUESTIONS).map(start=>cards.slice(start,start+3))}
  function renderCards(reveal=false){
    cardsArea.innerHTML='';order.forEach((card,i)=>{const slot=document.createElement('div');slot.className='slot';if(selectedIndex===i)slot.classList.add('selected');if(reveal)slot.classList.add(card.no===answer[i].no?'correct':'wrong');const img=document.createElement('img');img.src=imagePath(card,!reveal);img.alt=reveal?`${card.name}、${card.theme}`:`${i+1}番目に置かれた文字のないカード`;
      const pick=document.createElement('button');pick.type='button';pick.className='slot-pick';pick.disabled=reveal;pick.setAttribute('aria-label',`${i+1}番目のカードを選ぶ`);pick.addEventListener('click',()=>selectSlot(i));const move=document.createElement('div');move.className='move';const left=document.createElement('button');left.type='button';left.textContent='←';left.disabled=reveal||i===0;left.setAttribute('aria-label','左へ動かす');left.addEventListener('click',()=>moveCard(i,-1));const right=document.createElement('button');right.type='button';right.textContent='→';right.disabled=reveal||i===2;right.setAttribute('aria-label','右へ動かす');right.addEventListener('click',()=>moveCard(i,1));move.append(left,right);slot.append(img,pick,move);cardsArea.appendChild(slot)})
  }
  function selectSlot(i){if(locked)return;if(selectedIndex===null){selectedIndex=i;renderCards()}else if(selectedIndex===i){selectedIndex=null;renderCards()}else{[order[selectedIndex],order[i]]=[order[i],order[selectedIndex]];selectedIndex=null;renderCards()}}
  function moveCard(i,delta){if(locked)return;const j=i+delta;if(j<0||j>2)return;[order[i],order[j]]=[order[j],order[i]];selectedIndex=null;renderCards()}
  function showQuestion(){answer=rounds[index];order=shuffle(answer);if(order.every((c,i)=>c.no===answer[i].no))[order[0],order[1]]=[order[1],order[0]];selectedIndex=null;locked=false;hintUsed=false;story.classList.remove('show');story.innerHTML='';controls.hidden=false;feedback.classList.remove('show');renderCards();updateProgress()}
  function useHint(){if(locked||hintUsed)return;hintUsed=true;const first=answer[0];const at=order.findIndex(c=>c.no===first.no);if(at!==0)[order[0],order[at]]=[order[at],order[0]];selectedIndex=null;renderCards();const firstSlot=cardsArea.children[0];firstSlot.classList.add('correct');document.getElementById('hintButton').textContent='最初の1枚を置いたよ'}
  function check(){
    if(locked)return;locked=true;const correct=order.every((c,i)=>c.no===answer[i].no);if(correct)score++;else order=[...answer];renderCards(true);showStory();controls.hidden=true;feedbackTitle.textContent=correct?'✨ 旅の道がつながった！':'🌱 本当の旅路を発見！';feedbackCopy.textContent=correct?'3つの場面が、物語の順につながりました。':'正しい順に並び直しました。文字入りカードと短い物語で、流れを見てみよう。';feedback.classList.add('show');document.getElementById('nextButton').textContent=index===QUESTIONS-1?'旅の結果を見る':'次の旅へ';updateProgress(true);const plays=Number(localStorage.getItem('journeyOrderRounds')||0)+1;localStorage.setItem('journeyOrderRounds',String(plays));if(correct){const hits=Number(localStorage.getItem('journeyOrderCorrect')||0)+1;localStorage.setItem('journeyOrderCorrect',String(hits))}
  }
  function showStory(){story.innerHTML='';answer.forEach(card=>{const row=document.createElement('div');row.className='story-row';const no=document.createElement('span');no.className='story-no';no.textContent=Number(card.no);const text=document.createElement('div');const strong=document.createElement('strong');strong.textContent=`${card.name}｜${card.theme}`;const p=document.createElement('p');p.textContent=card.story.replace(/\n/g,' ');text.append(strong,p);row.append(no,text);story.appendChild(row)});story.classList.add('show')}
  function complete(){document.getElementById('game').hidden=true;document.getElementById('status').hidden=true;document.getElementById('finish').classList.add('show');document.getElementById('finishTitle').textContent=score===3?'3つの旅路が完成！':`${QUESTIONS}つの旅路を発見！`;document.getElementById('finishCopy').textContent=score===3?'絵から物語の流れをしっかり見つけられました。':'迷った順番も、物語を知る大切な出会いです。'}
  function start(){rounds=createRounds();index=0;score=0;document.getElementById('game').hidden=false;document.getElementById('status').hidden=false;document.getElementById('finish').classList.remove('show');document.getElementById('hintButton').textContent='1枚ヒント';showQuestion()}
  document.getElementById('hintButton').addEventListener('click',useHint);document.getElementById('checkButton').addEventListener('click',check);document.getElementById('nextButton').addEventListener('click',()=>{index++;if(index>=QUESTIONS)complete();else{document.getElementById('hintButton').textContent='1枚ヒント';showQuestion()}});document.getElementById('again').addEventListener('click',start);start();
})();
</script>
</body>
</html>
