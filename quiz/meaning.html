
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>八卦の意味クイズ・身体部位・年代対応版</title>
<style>
:root{--panel:#fffdf7;--text:#2f2a25;--sub:#756b61;--line:#d7cbbb}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:var(--text);background:linear-gradient(180deg,#f7f2e9,#eee5d7)}
main{width:min(700px,100%);margin:0 auto;padding:24px 16px 40px}
h1{margin:0 0 8px;font-size:clamp(24px,6vw,36px)}
.lead{margin:0 0 20px;color:var(--sub)}
.panel{padding:22px 16px;background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 24px rgba(75,55,30,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat{padding:10px 4px;text-align:center;border:1px solid var(--line);border-radius:12px;background:#fffaf1}
.stat strong{display:block;font-size:22px}.stat span{font-size:12px;color:var(--sub)}
.question-box{min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;border:1px solid var(--line);border-radius:18px;background:#faf6ee;text-align:center}
#category{margin-bottom:10px;font-size:14px;color:var(--sub)}
#question{font-size:clamp(28px,8vw,46px);font-weight:800;line-height:1.35}
#subquestion{margin-top:12px;font-size:18px;color:var(--sub)}
#buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:18px}
button{appearance:none;min-height:58px;padding:14px 10px;border:1px solid #bcae9d;border-radius:14px;background:#fffaf1;color:var(--text);font-size:18px;font-weight:700;cursor:pointer}
button:active{transform:scale(.98)}button:disabled{opacity:.6}
#message{min-height:36px;margin-top:18px;font-size:21px;font-weight:700}
#detail{min-height:52px;color:var(--sub);line-height:1.6}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.secondary{background:#f1eadf}.danger{background:#efe1dc}
.legend{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);color:var(--sub);font-size:14px;line-height:1.8}
@media (max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}#buttons,.actions{grid-template-columns:1fr}}
</style>

<style>
.app-home{position:fixed;top:max(12px,env(safe-area-inset-top));left:12px;z-index:50;display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border:1px solid rgba(120,100,75,.35);border-radius:999px;background:rgba(255,250,240,.9);backdrop-filter:blur(8px);color:#3a2d22;text-decoration:none;font:600 13px/1.2 "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;box-shadow:0 5px 18px rgba(45,30,15,.12)}.app-home:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<a class="app-home" href="../index.html" aria-label="目次へ戻る">← 目次</a>
<main>
<h1>八卦の意味クイズ</h1>
<p class="lead">意味・性質・人物・年代・身体部位から、対応する八卦を当てよう。</p>
<section class="panel">
<div class="stats">
<div class="stat"><strong id="total">0</strong><span>回答数</span></div>
<div class="stat"><strong id="correct">0</strong><span>正解数</span></div>
<div class="stat"><strong id="combo">0</strong><span>連続正解</span></div>
<div class="stat"><strong id="best">0</strong><span>最高コンボ</span></div>
</div>
<div class="question-box">
<div id="category">中心的な性質</div>
<div id="question">創造する力</div>
<div id="subquestion">この意味に対応する八卦は？</div>
</div>
<div id="buttons"></div>
<div id="message"></div>
<div id="detail"></div>
<div class="actions">
<button class="secondary" onclick="resetStats()">記録をリセット</button>
<button class="danger" onclick="pauseGame()" id="pauseBtn">一時停止</button>
</div>
<div class="legend">間違えた意味は、しばらくすると再び出題されます。<br>※象意は学習用に整理・簡略化しています。年代は現代的な目安です。</div>
</section>
</main>
<script>
const bagua=[
{mark:"☰",name:"乾",yomi:"けん",nature:"天",meanings:[
{category:"中心的な性質",text:"創造する力"},
{category:"動き",text:"力強く前へ進む"},
{category:"人物像",text:"父・指導者・責任者"},
{category:"年齢・性別",text:"50代以上の男性"},
{category:"身体部位",text:"頭・脳・骨"},
{category:"連想語",text:"始まり・意志・健やかさ"}]},
{mark:"☷",name:"坤",yomi:"こん",nature:"地",meanings:[
{category:"中心的な性質",text:"受け入れ、育てる"},
{category:"動き",text:"支えながら従う"},
{category:"人物像",text:"母・養育する人・支える人"},
{category:"年齢・性別",text:"50代以上の女性"},
{category:"身体部位",text:"腹部・胃・筋肉"},
{category:"連想語",text:"受容・大地・柔順"}]},
{mark:"☳",name:"震",yomi:"しん",nature:"雷",meanings:[
{category:"中心的な性質",text:"動き始める"},
{category:"動き",text:"突然の変化を起こす"},
{category:"人物像",text:"長男・先頭に立つ人"},
{category:"年齢・性別",text:"30〜40代の男性"},
{category:"身体部位",text:"足・肝臓・神経"},
{category:"連想語",text:"雷・驚き・発動"}]},
{mark:"☴",name:"巽",yomi:"そん",nature:"風",meanings:[
{category:"中心的な性質",text:"柔らかく入り込む"},
{category:"動き",text:"少しずつ浸透する"},
{category:"人物像",text:"長女・調整する人"},
{category:"年齢・性別",text:"30〜40代の女性"},
{category:"身体部位",text:"太もも・股関節・呼吸器"},
{category:"連想語",text:"風・伝達・従順"}]},
{mark:"☵",name:"坎",yomi:"かん",nature:"水",meanings:[
{category:"中心的な性質",text:"危険の中を進む"},
{category:"動き",text:"深い場所へ落ち込む"},
{category:"人物像",text:"中男・試練を経験する人"},
{category:"年齢・性別",text:"20〜30代の男性"},
{category:"身体部位",text:"耳・腎臓・泌尿器"},
{category:"連想語",text:"水・困難・深さ"}]},
{mark:"☲",name:"離",yomi:"り",nature:"火",meanings:[
{category:"中心的な性質",text:"明らかにし、照らす"},
{category:"動き",text:"何かに付着して燃える"},
{category:"人物像",text:"中女・知性を使う人"},
{category:"年齢・性別",text:"20〜30代の女性"},
{category:"身体部位",text:"目・心臓・血液"},
{category:"連想語",text:"火・明知・美しさ"}]},
{mark:"☶",name:"艮",yomi:"ごん",nature:"山",meanings:[
{category:"中心的な性質",text:"止まり、境界を作る"},
{category:"動き",text:"今いる場所で静止する"},
{category:"人物像",text:"少男・区切りをつける人"},
{category:"年齢・性別",text:"10代〜20代前半の男性"},
{category:"身体部位",text:"手・指・背中・鼻"},
{category:"連想語",text:"山・停止・節度"}]},
{mark:"☱",name:"兌",yomi:"だ",nature:"沢",meanings:[
{category:"中心的な性質",text:"喜び、交流する"},
{category:"動き",text:"言葉や笑顔で和らげる"},
{category:"人物像",text:"少女・楽しませる人"},
{category:"年齢・性別",text:"10代〜20代前半の女性"},
{category:"身体部位",text:"口・舌・歯・肺"},
{category:"連想語",text:"沢・喜悦・会話"}]}
];
const questionPool=bagua.flatMap(item=>item.meanings.map(meaning=>({...meaning,answer:item})));
let total=0,correct=0,combo=0,best=Number(localStorage.getItem("baguaMeaningBestCombo")||0);
let current=null,previousText="",reviewQueue=[],locked=false,paused=false;
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function chooseQuestion(){if(reviewQueue.length&&Math.random()<.45){const q=reviewQueue.shift();if(q.text!==previousText)return q;reviewQueue.push(q)}const c=questionPool.filter(q=>q.text!==previousText);return c[Math.floor(Math.random()*c.length)]}
function makeChoices(ans){return shuffle([ans,...shuffle(bagua.filter(x=>x.name!==ans.name)).slice(0,3)])}
function updateStats(){totalEl.textContent=total;correctEl.textContent=correct;comboEl.textContent=combo;bestEl.textContent=best}
const totalEl=document.getElementById("total"),correctEl=document.getElementById("correct"),comboEl=document.getElementById("combo"),bestEl=document.getElementById("best");
function showQuestion(){
if(paused)return;locked=false;current=chooseQuestion();previousText=current.text;
category.textContent=current.category;question.textContent=current.text;subquestion.textContent="この意味に対応する八卦は？";message.textContent="";detail.textContent="";
buttons.innerHTML="";makeChoices(current.answer).forEach(choice=>{const b=document.createElement("button");b.textContent=`${choice.mark} ${choice.name}（${choice.yomi}）`;b.onclick=()=>answer(choice);buttons.appendChild(b)})
}
function answer(choice){
if(locked||paused)return;locked=true;total++;document.querySelectorAll("#buttons button").forEach(b=>b.disabled=true);
if(choice.name===current.answer.name){correct++;combo++;if(combo>best){best=combo;localStorage.setItem("baguaMeaningBestCombo",String(best))}message.textContent=combo>=5?`🔥 ${combo}連続正解！`:"⭕ 正解"}
else{combo=0;reviewQueue.push(current);message.textContent=`❌ 正解は「${current.answer.name}」`}
const profile=current.answer.meanings
.filter(m=>["人物像","年齢・性別","身体部位"].includes(m.category))
.map(m=>`${m.category}：${m.text}`).join("｜");
detail.textContent=`${current.answer.mark} ${current.answer.name}（${current.answer.yomi}）＝ ${current.answer.nature}｜${current.text}｜${profile}`;
updateStats();setTimeout(showQuestion,1200)
}
function resetStats(){total=correct=combo=best=0;reviewQueue=[];localStorage.removeItem("baguaMeaningBestCombo");updateStats();message.textContent="記録をリセットしました";detail.textContent=""}
function pauseGame(){paused=!paused;if(paused){pauseBtn.textContent="再開";category.textContent="";question.textContent="⏸";subquestion.textContent="一時停止中";message.textContent="";detail.textContent="";buttons.innerHTML=""}else{pauseBtn.textContent="一時停止";showQuestion()}}
updateStats();showQuestion();
</script>
