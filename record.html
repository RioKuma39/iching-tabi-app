<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#efe6d4"><title>旅の記録｜イーチン旅タロット</title>
<style>
:root{--paper:#f4efe3;--panel:#fffaf1;--ink:#2a2118;--sub:#756654;--line:#d8c8ad;--accent:#345d69;--danger:#87493b}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"Yu Mincho","YuMincho","Hiragino Mincho ProN",serif;background:radial-gradient(circle at 50% 5%,#fffaf0,var(--paper) 55%,#e8dcc8);min-height:100vh}a{color:inherit}.wrap{width:min(960px,92vw);margin:auto;padding:76px 0 60px}.back{position:fixed;z-index:5;top:14px;left:14px;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,250,240,.94);text-decoration:none;font-family:"Yu Gothic",sans-serif;font-size:14px}header{text-align:center;margin-bottom:28px}h1{margin:0 0 10px;font-size:clamp(34px,7vw,54px);font-weight:500;letter-spacing:.08em}header p{margin:0;color:var(--sub);line-height:1.8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.panel{padding:22px;border:1px solid var(--line);border-radius:22px;background:rgba(255,250,240,.82);box-shadow:0 12px 32px rgba(54,38,20,.08)}.panel.wide{grid-column:1/-1}.panel h2{margin:0 0 14px;font-size:22px;font-weight:500}.big{margin:0;font-size:28px}.sub{color:var(--sub)}.progress{height:11px;margin-top:12px;border-radius:999px;overflow:hidden;background:#e2d7c4}.bar{height:100%;background:var(--accent)}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.card{display:block;text-decoration:none}.card img{width:100%;aspect-ratio:2/3;display:block;object-fit:cover;border-radius:10px;box-shadow:0 7px 18px rgba(54,38,20,.16)}.card span{display:block;margin-top:7px;font-size:13px;line-height:1.5}.list{display:grid;gap:8px}.list a{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fffaf0;text-decoration:none}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{padding:13px;border-radius:12px;background:rgba(244,239,227,.75);line-height:1.7}.stat strong{display:block}.empty{margin:0;color:var(--sub);line-height:1.8}.reset{margin-top:28px;text-align:center}.reset>button,.dialog-actions button{min-height:46px;padding:10px 17px;border:1px solid var(--line);border-radius:999px;background:#fffaf0;color:var(--danger);font:inherit;cursor:pointer}dialog{width:min(520px,90vw);border:1px solid var(--line);border-radius:20px;padding:24px;background:var(--panel);color:var(--ink)}dialog::backdrop{background:rgba(25,22,18,.55)}dialog h2{margin-top:0}.dialog-actions{display:grid;gap:10px}.dialog-actions button:last-child{color:var(--sub)}button:focus-visible,a:focus-visible{outline:3px solid #c37b55;outline-offset:2px}@media(max-width:700px){.grid{grid-template-columns:1fr}.panel.wide{grid-column:auto}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:1fr}}
</style></head><body><a class="back" href="index.html">← ホーム</a><main class="wrap"><header><h1>旅の記録</h1><p>図鑑で出会ったカードと、クイズで歩んだ道のりを振り返れます。</p></header><div class="grid">
<section class="panel"><h2>旅の進み具合</h2><p class="big" id="viewedCount">0 / 64枚</p><p class="sub">閲覧したカード</p><div class="progress" id="progress" role="progressbar" aria-label="64卦の閲覧進捗" aria-valuemin="0" aria-valuemax="64" aria-valuenow="0"><div class="bar" id="bar"></div></div></section>
<section class="panel"><h2>今日の一枚クイズ</h2><p class="big" id="dailyCount">今月取り組んだ日数：0日</p><p class="sub"><a href="quiz/daily-card.html">今日の一問に挑戦する ›</a></p></section>
<section class="panel wide"><h2>お気に入り</h2><div class="cards" id="favorites"></div></section>
<section class="panel"><h2>最近見たカード</h2><div class="list" id="recent"></div></section>
<section class="panel"><h2>クイズ記録</h2><div class="stats" id="stats"></div></section>
</div><div class="reset"><button id="resetButton" type="button">記録をリセット</button></div></main>
<dialog id="resetDialog"><h2>どの記録をリセットしますか？</h2><p>この操作は元に戻せません。アプリと関係のない保存データは削除しません。</p><div class="dialog-actions"><button type="button" data-reset="learning">学習記録だけリセット</button><button type="button" data-reset="all">お気に入りを含むすべての記録をリセット</button><button type="button" id="cancelReset">キャンセル</button></div></dialog>
<script src="tarot/cards.js"></script><script src="assets/js/storage.js"></script><script>
(()=>{if(typeof cards==="undefined"||!Array.isArray(cards))return;const S=IchingStorage;const cardFor=no=>cards.find(c=>c.no===no);const linkFor=no=>`tarot/library.html?no=${Number(no)}`;
function render(){const viewed=S.readArray(S.KEYS.viewed),favorites=S.readArray(S.KEYS.favorites),recent=S.readArray(S.KEYS.recent);const count=Math.min(viewed.length,64);document.getElementById("viewedCount").textContent=`${count} / 64枚`;document.getElementById("bar").style.width=`${count/64*100}%`;document.getElementById("progress").setAttribute("aria-valuenow",String(count));
const fav=document.getElementById("favorites");fav.innerHTML="";favorites.forEach(no=>{const c=cardFor(no);if(!c)return;const a=document.createElement("a");a.className="card";a.href=linkFor(no);a.innerHTML=`<img src="tarot/cards/${no}.webp" alt="${no} ${c.name}" loading="lazy"><span>${Number(no)} ${c.name}</span>`;fav.appendChild(a)});if(!fav.children.length)fav.innerHTML='<p class="empty">まだお気に入りのカードはありません。<br>図鑑で気になるカードの「☆」を押すと、ここに保存できます。</p>';
const rec=document.getElementById("recent");rec.innerHTML="";recent.forEach(no=>{const c=cardFor(no);if(!c)return;const a=document.createElement("a");a.href=linkFor(no);a.textContent=`${no} ${c.name}`;rec.appendChild(a)});if(!rec.children.length)rec.innerHTML='<p class="empty">まだ最近見たカードはありません。</p>';
const history=S.readObject("dailyCardHistory"),now=new Date(),prefix=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;document.getElementById("dailyCount").textContent=`今月取り組んだ日数：${Object.keys(history).filter(k=>k.startsWith(prefix)&&history[k]?.completed).length}日`;
const definitions=[["絵からテーマ","pictureThemeSeen","pictureThemeCorrect","score"],["テーマからカード","themePictureSeen","themePictureCorrect","score"],["文字かくし","textHideRounds","textHideCorrect","score"],["旅カルタ","journeyKarutaPlays",null,"plays"],["旅の順番","journeyOrderRounds","journeyOrderCorrect","score"],["神経衰弱","plainTextMemoryPlays","plainTextMemoryBest","memory"],["八卦マーク","baguaBestCombo",null,"combo"],["八卦マーク逆引き","baguaReverseBestCombo",null,"combo"],["八卦意味","baguaMeaningBestCombo",null,"combo"]];const stats=document.getElementById("stats");stats.innerHTML="";definitions.forEach(([label,a,b,type])=>{const first=S.readNumber(a),second=b?S.readNumber(b):0;if(!first)return;const d=document.createElement("div");d.className="stat";let text=type==="score"?`${first}問中 ${second}問正解`:type==="plays"?`${first}回遊びました`:type==="memory"?`${first}回遊び・最高${second}手`: `最高${first}問連続正解`;d.innerHTML=`<strong>${label}</strong>${text}`;stats.appendChild(d)});if(!stats.children.length)stats.innerHTML='<p class="empty">まだクイズの記録はありません。遊ぶと、ここに記録されます。</p>';}
const dialog=document.getElementById("resetDialog");document.getElementById("resetButton").addEventListener("click",()=>dialog.showModal());document.getElementById("cancelReset").addEventListener("click",()=>dialog.close());document.querySelectorAll("[data-reset]").forEach(b=>b.addEventListener("click",()=>{S.reset(b.dataset.reset==="all");dialog.close();render();}));render();})();
</script><footer style="margin-top:40px;padding:24px;text-align:center;color:#666;font-size:14px;border-top:1px solid #ddd"><p>© 2026 りおくま</p><p>企画・制作：りおくま</p><p>制作協力：ChatGPT（OpenAI）</p></footer></body></html>
